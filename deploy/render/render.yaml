# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Otari on Render: Blueprint for deploy from deploy/render/render.yaml
# Docs: deploy/render/README.md
# Image: https://hub.docker.com/r/mzdotai/otari
#
# Pattern: image-wrapper (official mzdotai/otari image; no source build on Render)
# Env-only standalone: Otari web + managed Postgres (auto_migrate + bootstrap key).

previews:
  generation: "off"

projects:
  - name: otari
    environments:
      - name: production
        services:
          - type: web
            name: otari
            runtime: image
            plan: free
            region: oregon
            image:
              url: docker.io/mzdotai/otari:0.2.0
            # Readiness verifies both the process and its Postgres connection.
            healthCheckPath: /health/readiness
            envVars:
              # Otari binds OTARI_PORT (default 8000), not Render's PORT.
              # Pin both so Render's port scanner and the process agree.
              - key: PORT
                value: "8000"
              - key: OTARI_PORT
                value: "8000"
              - key: OTARI_HOST
                value: "0.0.0.0"
              - key: OTARI_DATABASE_URL
                fromDatabase:
                  name: otari-db
                  property: connectionString
              - key: OTARI_MASTER_KEY
                generateValue: true
              # Keep fail-closed pricing enabled and use Otari's bundled prices
              # for common models. Custom models still need explicit pricing.
              - key: OTARI_DEFAULT_PRICING
                value: "true"
              - key: OTARI_AUTO_MIGRATE
                value: "true"
              - key: OTARI_BOOTSTRAP_API_KEY
                value: "true"
              # Provider credentials (any-llm). Prompted on initial Blueprint
              # create so deployers can fill whichever providers they use.
              # At least one is needed to serve traffic; leave unused keys blank.
              - key: OPENAI_API_KEY
                sync: false
              - key: ANTHROPIC_API_KEY
                sync: false
              - key: MISTRAL_API_KEY
                sync: false
              - key: GEMINI_API_KEY
                sync: false

        databases:
          - name: otari-db
            plan: free
            region: oregon
            databaseName: otari
            user: otari
            postgresMajorVersion: "16"
            ipAllowList: []
