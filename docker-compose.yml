services:
  gateway:
    # Pulls from Docker Hub by default. Contributors testing a feature branch
    # with unreleased code should build the image locally first:
    #     docker build -t mzdotai/otari:latest .
    # Docker prefers the local image over the registry tag once it exists.
    image: docker.io/mzdotai/otari:latest

    # If you want to use a different port, change it here and in the config.yml file.
    ports:
      # Host port 8000 by default. Override via $OTARI_PORT when other
      # services on the host already own :8000 (e.g. another local backend).
      - "${OTARI_PORT:-${GATEWAY_PORT:-8000}}:8000"
    volumes:
      # Default `./config.yml` matches the existing operator convention
      # (gitignored, operator-supplied). The demo overrides this via
      # GATEWAY_CONFIG_PATH=./demo/code-exec/gateway-config.yml so the
      # repo's main config.yml stays untouched.
      - ${GATEWAY_CONFIG_PATH:-./config.yml}:/app/config.yml
      - ./service_account.json:/app/service_account.json
    command: ["gateway", "serve", "--config", "/app/config.yml"]
    environment:
      # In-network URL of the sandbox image — set so the gateway can dispatch
      # `code_execution` tool calls to the sandbox container without any
      # client-side configuration.
      - GATEWAY_SANDBOX_URL=http://sandbox:8080
      # Optional operator-level purpose hint for the code_execution tool. Falls
      # back to a Python/pandas/numpy-flavoured default if unset. Per-request
      # tools[i].purpose_hint still wins over this.
      - GATEWAY_SANDBOX_PURPOSE_HINT=${GATEWAY_SANDBOX_PURPOSE_HINT:-}
      # In-network URL of the web-search backend — any HTTP service exposing
      # a SearXNG-compatible /search?format=json endpoint. The bundled
      # `searxng` profile container is the default; swap by changing this URL
      # to point at any other adapter (commercial-API fronting service etc.).
      - GATEWAY_WEB_SEARCH_URL=${GATEWAY_WEB_SEARCH_URL:-http://searxng:8080}
      # Optional knobs. Defaults are conservative — see web_search_backend.py.
      - GATEWAY_WEB_SEARCH_ENGINES=${GATEWAY_WEB_SEARCH_ENGINES:-}
      - GATEWAY_WEB_SEARCH_MAX_RESULTS=${GATEWAY_WEB_SEARCH_MAX_RESULTS:-}
      - GATEWAY_WEB_SEARCH_EXTRACT=${GATEWAY_WEB_SEARCH_EXTRACT:-}
      - GATEWAY_WEB_SEARCH_PURPOSE_HINT=${GATEWAY_WEB_SEARCH_PURPOSE_HINT:-}
      # Optional operator-level header for the per-tool hint block in the system
      # message. Falls back to "You have access to the following tools:" if unset.
      # Useful for tone/translation/deployment-wide preferences. Not per-request:
      # callers who want a custom framing should set their own system message.
      - GATEWAY_TOOLS_HEADER=${GATEWAY_TOOLS_HEADER:-}
      # Pass provider API keys from host env so config.yml stays free of
      # secrets. any-llm/the underlying SDK picks them up when the config
      # doesn't override.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Local llamafile (open-weight model) endpoint. host.docker.internal
      # routes from the gateway container back to a llamafile running on
      # the macOS/Windows host. Override if you run the model elsewhere.
      - LLAMAFILE_API_BASE=${LLAMAFILE_API_BASE:-http://host.docker.internal:8080/v1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      # Host port 5433 (container still :5432) — avoids clashing with another
      # local postgres on the default port. Gateway connects via the Docker
      # network at postgres:5432, so the host mapping is only for external
      # tools (psql / TablePlus / etc.). Override with $GATEWAY_POSTGRES_PORT.
      - "${GATEWAY_POSTGRES_PORT:-5433}:5432"
    environment:
      - POSTGRES_USER=gateway
      - POSTGRES_PASSWORD=gateway
      - POSTGRES_DB=gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Code-execution sandbox — a Python REPL container the gateway dispatches
  # `code_execution` tool calls to. Source + build live in their own repo:
  # https://github.com/mozilla-ai/otari-sandbox-container — CI publishes
  # `mzdotai/otari-sandbox-container:{latest,<sha>}` on Docker Hub on every
  # push to that repo's main branch.
  # Override the tag via $OTARI_SANDBOX_IMAGE if you need a specific build.
  #
  # Opt-in via the `code-exec` compose profile so operators who don't use
  # code_execution aren't forced to pull this image or wait on its health
  # check. Bring it up with `docker compose --profile code-exec up` (the
  # demo's start.sh passes this flag automatically). When the sandbox is
  # not running, the gateway returns a clean 502 to any request that
  # actually tries to dispatch `code_execution`.
  sandbox:
    profiles: ["code-exec"]
    image: ${OTARI_SANDBOX_IMAGE:-docker.io/mzdotai/otari-sandbox-container:latest}
    ports:
      # Bound to localhost only: the sandbox runs arbitrary user-supplied
      # code, so an open port on the host network would be an RCE surface
      # to anyone on the LAN. The gateway container reaches it via the
      # Docker network at `sandbox:8080`; this host-side mapping is just
      # for ad-hoc curl/debugging from the operator's own machine.
      - "127.0.0.1:8180:8080"
    environment:
      - SANDBOX_SESSIONS_ROOT=/var/sandbox/sessions
      - SANDBOX_SESSION_IDLE_TIMEOUT=900
      - SANDBOX_SESSION_MAX_LIFETIME=7200
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Web-search backend — a SearXNG instance the gateway dispatches `web_search`
  # tool calls to. SearXNG is a metasearch front-end over many upstream
  # engines; the gateway's default engine list deliberately excludes Google,
  # Bing, Yahoo and Brave (which forbid automated querying or sell a paid
  # API) and uses duckduckgo/mojeek/qwant/wikipedia — the most defensible
  # OSS combination. Operators who enable scraping-of-major-engines do so
  # consciously and should review the upstream engines' Terms of Service.
  #
  # For commercial / production use, swap this container for a service that
  # uses a licensed API (Tavily, Brave Search API with key, Exa, Linkup,
  # Serper). Any HTTP service that exposes a SearXNG-compatible
  # /search?format=json shape is a drop-in replacement — just change
  # GATEWAY_WEB_SEARCH_URL in the gateway's environment.
  #
  # Opt-in via the `web-search` compose profile so operators who don't use
  # the web_search tool aren't forced to pull this image. Bring it up with
  # `docker compose --profile web-search up`. When the searxng container is
  # not running, the gateway returns a clean 502 to any request that tries
  # to dispatch `web_search`.
  searxng:
    profiles: ["web-search"]
    image: docker.io/searxng/searxng:latest
    ports:
      # Bound to localhost only — like sandbox, this is internal infra. The
      # gateway reaches it via the Docker network at `searxng:8080`; the
      # host mapping is just for ad-hoc curl/debugging.
      - "127.0.0.1:8181:8080"
    volumes:
      - ./scripts/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      # Public-facing base URL SearXNG uses for self-references (OpenSearch
      # descriptor, UI links, CSP origins). Must match the host port mapping
      # above so ad-hoc curl / browser access lines up; the gateway itself
      # reaches SearXNG over the Docker network at ``searxng:8080`` and
      # doesn't use this value.
      - SEARXNG_BASE_URL=http://localhost:8181/
      # SearXNG uses a per-instance secret for CSRF tokens etc. The default
      # below is fine for a single-tenant gateway-internal deployment; rotate
      # via $SEARXNG_SECRET for multi-tenant or public-facing setups.
      - SEARXNG_SECRET=${SEARXNG_SECRET:-otari-gateway-local-dev-secret}
    restart: unless-stopped

volumes:
  postgres_data:
