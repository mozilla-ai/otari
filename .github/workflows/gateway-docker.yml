name: Publish Gateway Docker Image

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/gateway/**'
      - 'alembic/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'config.example.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/docker_liveness_check.sh'
      - '.github/workflows/gateway-docker.yml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: mzdotai/gateway
  AWS_REGION: us-east-2

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image-output.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Truncate commit SHA
        run: echo "GITHUB_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: gateway-test:${{ github.sha }}
          build-args: |
            GATEWAY_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container liveness check
        run: ./scripts/docker_liveness_check.sh gateway-test:${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GITHUB_SHA_SHORT }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GATEWAY_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          cache-from: type=gha

      - name: Set image output
        id: image-output
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GITHUB_SHA_SHORT }}" >> $GITHUB_OUTPUT

  update-dockerhub-description:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: mzdotai/gateway
          readme-filepath: ./README.md

  deploy-development:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition otari-platform-gateway-task-development \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        run: |
          cat task-definition.json \
            | jq --arg IMAGE "${{ needs.build-and-push-image.outputs.image }}" \
              '.containerDefinitions[0].image = $IMAGE' \
            > new-task-definition.json

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: new-task-definition.json
          service: otari-platform-gateway-service-development
          cluster: otari-platform-cluster-development
          wait-for-service-stability: true
