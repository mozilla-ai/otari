name: Otari Dashboard

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/**'
      - 'src/gateway/static/dashboard/**'
      - '.github/workflows/otari-dashboard.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'src/gateway/static/dashboard/**'
      - '.github/workflows/otari-dashboard.yml'
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type-check
      run: npm run typecheck

    - name: Test
      run: npm test

    - name: Build
      run: npm run build

    - name: Verify committed bundle is up to date
      run: |
        # --porcelain catches untracked files too, so a new hashed asset that the
        # build added but nobody committed still fails the check (git diff would miss it).
        if [ -n "$(git status --porcelain -- ../src/gateway/static/dashboard)" ]; then
          echo "::error::The committed dashboard bundle in src/gateway/static/dashboard is stale."
          echo "Run 'npm --prefix web run build' and commit the result."
          git --no-pager status --porcelain -- ../src/gateway/static/dashboard
          exit 1
        fi

  e2e:
    # Browser end-to-end smoke: boot the gateway serving the freshly built bundle
    # (Playwright's webServer, see web/playwright.config.ts) and walk the core
    # multi-page flows a real operator does.
    #
    # Scoped to the workflow's web/** + committed-bundle paths: a src/gateway
    # backend change that breaks a dashboard-served flow is not caught here (the
    # main test suite covers the API). Broadening the trigger to src/gateway/**
    # is a possible follow-up if that gap starts to bite.
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        python-version: "3.14"

    - name: Install Python deps
      run: uv sync --dev --frozen

    - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install web deps
      working-directory: web
      run: npm ci

    - name: Install Playwright Chromium
      working-directory: web
      run: npx playwright install --with-deps chromium

    # `npm run e2e` builds the bundle first (see web/package.json), so a local run
    # and CI serve the same freshly built dashboard.
    - name: Run end-to-end tests
      working-directory: web
      run: npm run e2e
