name: Gateway SDK Codegen

# Regenerates the full typed SDK client core (every endpoint: inference + control
# plane) from the gateway's OpenAPI spec and opens a PR against each language SDK
# repo. Each SDK wraps this generated core with a hand-written shell (streaming,
# typed error mapping, ergonomic methods); that shell is not regenerated here
# (see scripts/sdk_codegen/README.md).
#
# Requires a repository secret SDK_CODEGEN_TOKEN: a fine-grained PAT or GitHub App
# installation token with Contents:write and Pull-requests:write on
# mozilla-ai/otari-sdk-{python,ts,go,rust}. The default GITHUB_TOKEN cannot push
# to other repositories.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'docs/public/openapi.json'
      - 'scripts/sdk_codegen/**'
      - 'openapitools.json'
      - '.github/workflows/gateway-sdk-codegen.yml'
  workflow_dispatch:

permissions:
  contents: read

# The OpenAPI Generator version is pinned in openapitools.json
# (generator-cli.version). That file is the ONLY mechanism the
# @openapitools/openapi-generator-cli wrapper honors; the OPENAPI_GENERATOR_VERSION
# env var is ignored by the wrapper and must not be relied on. Bump the generator
# by editing openapitools.json deliberately and reviewing the resulting diff.

jobs:
  codegen:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Keep this matrix in sync with FULL_TARGETS in scripts/sdk_codegen/generate.py.
      matrix:
        include:
          - language: python
            sdk_repo: mozilla-ai/otari-sdk-python
            target_path: src/otari/_client
          - language: typescript
            sdk_repo: mozilla-ai/otari-sdk-ts
            target_path: src/_client
          - language: go
            sdk_repo: mozilla-ai/otari-sdk-go
            target_path: otari/client
          - language: rust
            sdk_repo: mozilla-ai/otari-sdk-rust
            target_path: src/_client

    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13
          activate-environment: true

      - name: Install gateway deps
        run: uv sync --dev --frozen

      - name: Set up Java (OpenAPI Generator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Install rustfmt (rust core is inlined and formatted in place)
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Generate ${{ matrix.language }} client (full typed core)
        run: uv run python scripts/sdk_codegen/generate.py --language ${{ matrix.language }} --mode full --out-dir dist

      - name: Checkout ${{ matrix.sdk_repo }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.sdk_repo }}
          token: ${{ secrets.SDK_CODEGEN_TOKEN }}
          path: sdk-repo

      - name: Sync generated client into the SDK repo
        run: |
          target="sdk-repo/${{ matrix.target_path }}"
          rm -rf "$target"
          mkdir -p "$(dirname "$target")"
          cp -r "dist/${{ matrix.language }}" "$target"

      - name: Open PR on ${{ matrix.sdk_repo }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SDK_CODEGEN_TOKEN }}
          path: sdk-repo
          branch: sdk-codegen/client-core
          delete-branch: true
          commit-message: "chore: regenerate SDK client core from gateway OpenAPI spec"
          title: "Regenerate SDK client core from gateway OpenAPI spec"
          body: |
            Automated regeneration of the generated typed client core (all
            endpoints) from the otari gateway OpenAPI spec. The hand-written shell
            (streaming, error mapping, ergonomic methods) is unaffected.

            Source: ${{ github.repository }}@${{ github.sha }}
            Generated by `.github/workflows/gateway-sdk-codegen.yml`.
