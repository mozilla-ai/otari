name: Gateway SDK Codegen

# Regenerates the control-plane SDK clients (API keys, users, budgets, pricing,
# usage) from the gateway's OpenAPI spec and opens a PR against each language SDK
# repo. The inference/proxy surface and batches stay hand-written, so they are not
# generated here (see scripts/sdk_codegen/README.md).
#
# Requires a repository secret SDK_CODEGEN_TOKEN: a fine-grained PAT or GitHub App
# installation token with Contents:write and Pull-requests:write on
# mozilla-ai/otari-sdk-{python,ts,go,rust}. The default GITHUB_TOKEN cannot push
# to other repositories.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'docs/public/openapi.json'
      - 'scripts/sdk_codegen/**'
      - '.github/workflows/gateway-sdk-codegen.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codegen:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Keep this matrix in sync with TARGETS in scripts/sdk_codegen/generate.py.
      matrix:
        include:
          - language: python
            sdk_repo: mozilla-ai/otari-sdk-python
            target_path: src/otari/_control_plane
          - language: typescript
            sdk_repo: mozilla-ai/otari-sdk-ts
            target_path: src/_control_plane
          - language: go
            sdk_repo: mozilla-ai/otari-sdk-go
            target_path: otari/generated
          - language: rust
            sdk_repo: mozilla-ai/otari-sdk-rust
            target_path: control-plane

    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13
          activate-environment: true

      - name: Install gateway deps
        run: uv sync --dev --frozen

      - name: Set up Java (OpenAPI Generator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Generate ${{ matrix.language }} control-plane client
        run: uv run python scripts/sdk_codegen/generate.py --language ${{ matrix.language }} --out-dir dist

      - name: Checkout ${{ matrix.sdk_repo }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.sdk_repo }}
          token: ${{ secrets.SDK_CODEGEN_TOKEN }}
          path: sdk-repo

      - name: Sync generated client into the SDK repo
        run: |
          target="sdk-repo/${{ matrix.target_path }}"
          rm -rf "$target"
          mkdir -p "$(dirname "$target")"
          cp -r "dist/${{ matrix.language }}" "$target"

      - name: Open PR on ${{ matrix.sdk_repo }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SDK_CODEGEN_TOKEN }}
          path: sdk-repo
          branch: sdk-codegen/control-plane
          delete-branch: true
          commit-message: "chore: regenerate control-plane client from gateway OpenAPI spec"
          title: "Regenerate control-plane client from gateway OpenAPI spec"
          body: |
            Automated regeneration of the control-plane client (keys, users,
            budgets, pricing, usage) from the otari gateway OpenAPI spec.

            Source: ${{ github.repository }}@${{ github.sha }}
            Generated by `.github/workflows/gateway-sdk-codegen.yml`.
