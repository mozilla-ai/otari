name: Otari Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/gateway/**'
      - 'alembic/**'
      - 'tests/integration/**'
      - 'tests/unit/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/otari-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/gateway/**'
      - 'alembic/**'
      - 'tests/integration/**'
      - 'tests/unit/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/otari-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: integration-tests

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: 3.14
        activate-environment: true

    - name: Install dependencies
      run: |
         uv sync --dev --frozen

    - name: Run Otari unit tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        uv run pytest tests/unit -v --cov --cov-report=xml -n auto

    - name: Run Otari integration tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        uv run pytest tests/integration -v --cov --cov-report=xml --cov-append -n auto

    - name: Upload coverage
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  openapi-spec:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: 3.14
        activate-environment: true

    - name: Install dependencies
      run: uv sync --frozen

    - name: Verify OpenAPI spec is up to date
      run: make openapi-check
