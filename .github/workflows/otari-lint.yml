name: Otari Lint

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/gateway/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/otari-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/gateway/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/otari-lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        python-version: 3.14
        activate-environment: true

    - name: Install dependencies
      run: uv sync --dev --frozen

    - name: Run Ruff lint
      run: make lint
