name: Otari Lint

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/gateway/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/otari-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/gateway/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/otari-lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        python-version: 3.14
        activate-environment: true

    - name: Install dependencies
      run: uv sync --dev --frozen

    - name: Run Ruff lint
      run: make lint
