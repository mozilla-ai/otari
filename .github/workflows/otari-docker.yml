name: Publish Otari Docker Image

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/gateway/**'
      - 'alembic/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'config.example.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/docker_liveness_check.sh'
      - '.github/workflows/otari-docker.yml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: mzdotai/otari

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image-output.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Truncate commit SHA
        run: echo "GITHUB_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image for testing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          tags: otari-test:${{ github.sha }}
          build-args: |
            OTARI_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container liveness check
        run: ./scripts/docker_liveness_check.sh otari-test:${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GITHUB_SHA_SHORT }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OTARI_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          cache-from: type=gha
          provenance: mode=max
          sbom: true

      - name: Set image output
        id: image-output
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GITHUB_SHA_SHORT }}" >> $GITHUB_OUTPUT

  update-dockerhub-description:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: mzdotai/otari
          readme-filepath: ./README.md

  notify-platform:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PLATFORM_DISPATCH_APP_ID }}
          private-key: ${{ secrets.PLATFORM_DISPATCH_APP_PRIVATE_KEY }}
          owner: mozilla-ai
          repositories: otari-ai

      - name: Dispatch deploy event to otari-ai
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_REF: ${{ needs.build-and-push-image.outputs.image }}
        run: |
          IMAGE_TAG="${IMAGE_REF##*:}"
          jq -nc --arg tag "$IMAGE_TAG" \
            '{event_type:"otari-image-published",client_payload:{image_tag:$tag}}' \
            | gh api -X POST /repos/mozilla-ai/otari-ai/dispatches --input -
