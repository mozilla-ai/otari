name: Publish Otari Docker Image

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/gateway/**'
      - 'alembic/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'config.example.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/docker_liveness_check.sh'
      - '.github/workflows/otari-docker.yml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: mzdotai/otari

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image-output.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Truncate commit SHA
        run: echo "GITHUB_SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: otari-test:${{ github.sha }}
          build-args: |
            OTARI_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container liveness check
        run: ./scripts/docker_liveness_check.sh otari-test:${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GITHUB_SHA_SHORT }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OTARI_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          cache-from: type=gha
          provenance: mode=max
          sbom: true

      - name: Set image output
        id: image-output
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.GITHUB_SHA_SHORT }}" >> $GITHUB_OUTPUT

  update-dockerhub-description:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: mzdotai/otari
          readme-filepath: ./README.md

  notify-platform:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PLATFORM_DISPATCH_APP_ID }}
          private-key: ${{ secrets.PLATFORM_DISPATCH_APP_PRIVATE_KEY }}
          owner: mozilla-ai
          repositories: otari-ai

      - name: Dispatch deploy event to otari-ai
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_REF: ${{ needs.build-and-push-image.outputs.image }}
        run: |
          IMAGE_TAG="${IMAGE_REF##*:}"
          jq -nc --arg tag "$IMAGE_TAG" \
            '{event_type:"otari-image-published",client_payload:{image_tag:$tag}}' \
            | gh api -X POST /repos/mozilla-ai/any-llm-platform/dispatches --input -
