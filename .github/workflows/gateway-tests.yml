name: Gateway Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/gateway/**'
      - 'alembic/**'
      - 'tests/integration/**'
      - 'tests/unit/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/gateway-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/gateway/**'
      - 'alembic/**'
      - 'tests/integration/**'
      - 'tests/unit/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/gateway-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: integration-tests

    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v7
      with:
        python-version: 3.13
        activate-environment: true

    - name: Install dependencies
      run: |
         uv sync --dev --frozen

    - name: Run gateway unit tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        uv run pytest tests/unit -v --cov --cov-report=xml -n auto

    - name: Run gateway integration tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        uv run pytest tests/integration -v --cov --cov-report=xml --cov-append -n auto

    - name: Upload coverage
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  openapi-spec:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v7
      with:
        python-version: 3.13
        activate-environment: true

    - name: Install dependencies
      run: uv sync --frozen

    - name: Verify OpenAPI spec is up to date
      run: uv run python scripts/generate_openapi.py --check
