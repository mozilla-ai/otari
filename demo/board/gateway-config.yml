# Board-demo gateway config — OSS standalone mode (no platform service).
# Mounted as /app/config.yml by docker-compose.
#
# This config powers Acts 1-3 of the board demo: a local open-weights model
# (llamafile) that gains code_execution + web_search the moment requests flow
# through the gateway. No keys are hardcoded here; any-llm reads provider
# credentials from env vars passed through by docker-compose.
#
# Act 4 (Otari.ai) is NOT driven by this file — it runs against the hosted
# platform, where managed providers (mzai, frontier) and the wallet live.

host: "0.0.0.0"
port: 8000

# Convenient default master key for local-dev / demo work.
master_key: demo-master-key

providers:
  # Local llamafile (open-weight model) — host.docker.internal lets the
  # gateway container reach the llamafile process running on the host.
  # This is the "open-weights" model for Acts 1-3. Override the base via
  # LLAMAFILE_API_BASE if you run the model elsewhere.
  llamafile:
    api_base: "http://host.docker.internal:8080/v1"

  # Optional frontier contrast for the OSS acts. any-llm reads OPENAI_API_KEY
  # from env; leave unset if you only want the open-weights story locally.
  openai: {}
