# Encoderfile guardrail config for the otari-anyguardrails service
# (used by `./start.sh --encoderfile`; mounted at /app/config/service.yaml).
#
# Instead of running a model in-process, this points at a separate encoderfile
# container — a single self-contained binary (Mozilla `encoderfile`) that
# serves a transformer encoder over HTTP. The `injec_guard` guardrail class
# wraps it via the EncoderfileProvider; the model (PIGuard) lives in the
# encoderfile container, so nothing is downloaded here at startup.
#
# Requires the `encoderfile` service from docker-compose.yml to be up (the
# anyguardrails container builds its guardrails eagerly at boot and polls the
# encoderfile server for readiness). `./start.sh --encoderfile` brings up both.
#
# The encoderfile images are published per-arch (amd64 + arm64); start.sh picks
# the right tag for the host.

threadpool:
  max_workers: 8

providers:
  encoderfile:
    type: EncoderfileProvider
    # Docker-network address of the encoderfile container (service name + port).
    base_url: "http://encoderfile:8080"

guardrails:
  # Same profile NAME as the default config (guardrails-service.yaml), so the
  # caller's request — {"profile": "prompt-injection"} — is identical whether
  # the model runs in-process (InjecGuard/HF) or via the encoderfile (PIGuard).
  # Only this server-side wiring differs. We omit model_id so the InjecGuard
  # class uses its default id for validation; in external-server mode the actual
  # model is whatever the encoderfile container serves (PIGuard).
  prompt-injection:
    guardrail_name: injec_guard
    provider: encoderfile
